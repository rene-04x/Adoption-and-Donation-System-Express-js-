<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Navbar Full</title>

<style>
/* ================= NAVBAR STYLE ================= */
.top-navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
    font-family: Arial, sans-serif;
}

.pawssion-brand {
    font-size: 18px;
    color: #02407D;
    margin: 0;
}

.sub {
    font-size: 11px;
    color: #64748b;
    margin: 0;
}

.user-profile-section {
    display: flex;
    align-items: center;
    gap: 20px;
}

.notification-bell {
    position: relative;
    cursor: pointer;
    font-size: 18px;
}

.notification-badge {
    position: absolute;
    top: -5px;
    right: -8px;
    background: red;
    color: #fff;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 50%;
}

.user-info {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    position: relative;
}

.user-avatar {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    object-fit: cover;
}

/* ================= PROFILE MODAL ================= */
.profile-modal {
    display: none;
    position: absolute;
    top: 50px;
    right: 0;
    z-index: 9999;
}

.profile-card {
    width: 280px;
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    text-align: center;
    position: relative;
}

.close-btn {
    position: absolute;
    right: 15px;
    top: 10px;
    cursor: pointer;
    font-size: 18px;
}

.avatar-section img {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #ddd;
    cursor: pointer;
}

.info-box {
    margin-top: 10px;
    text-align: left;
    background: #f8fafc;
    padding: 10px;
    border-radius: 8px;
}

.info-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 13px;
}

.admin-badge {
    color: green;
    font-weight: bold;
}

input[type="file"] {
    display: none;
}
</style>
</head>

<body>
<!-- NAVBAR -->
<header class="top-navbar">
    <div>
        <h1 class="pawssion-brand">
            CSPC PAWSsion <span>Benevolence Circle</span>
        </h1>
        <p class="sub">Animal Adoption & Donation Management System</p>
    </div>

    <div class="user-profile-section">

        <div class="notification-bell">
            🔔 <span class="notification-badge">30</span>
        </div>

        <div class="user-info" id="userInfo">
            <img src="../images/dog2.png" class="user-avatar" id="navAvatar">
            <span id="navUserName"></span>

            <!-- MODAL -->
            <div id="profileModal" class="profile-modal">
                <div class="profile-card">

                    <span class="close-btn" id="closeModal">&times;</span>

                    <div class="avatar-section">
                        <label for="imageUpload">
                            <img id="profileImage" src="../images/dog2.png">
                        </label>
                        <input type="file" id="imageUpload">
                    </div>

                    <h3>Hi, <span id="modalGreetingName">Admin</span></h3>

                    <div class="info-box">
                        <div class="info-row">
                            <span>Email</span>
                            <span id="display-email">loading...</span>
                        </div>
                        <div class="info-row">
                            <span>Account</span>
                            <span class="admin-badge">ADMIN</span>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>
</header>

<!-- ================= SCRIPT ================= -->
<script>
document.addEventListener("DOMContentLoaded", () => {

    const userInfo = document.getElementById("userInfo");
    const modal = document.getElementById("profileModal");
    const closeBtn = document.getElementById("closeModal");

    if (!userInfo || !modal) return;

    // RESET STATE
    modal.style.display = "none";

    // TOGGLE MODAL
    userInfo.addEventListener("click", (e) => {
        e.stopPropagation();
        modal.style.display = (modal.style.display === "block") ? "none" : "block";
    });

    // CLOSE BUTTON
    if (closeBtn) {
        closeBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            modal.style.display = "none";
        });
    }

    // OUTSIDE CLICK CLOSE (FIXED SAFE)
    document.addEventListener("click", (e) => {
        if (!userInfo.contains(e.target)) {
            modal.style.display = "none";
        }
    });

    // LOAD PROFILE
    loadProfile();

    async function loadProfile() {
        try {
            const res = await fetch('/admin/profile-data');
            const data = await res.json();

            document.getElementById("navUserName").textContent = data.username || "Admin";
            document.getElementById("modalGreetingName").textContent = data.username || "Admin";
            document.getElementById("display-email").textContent = data.email || "email@gmail.com";

            const img = data.profile_pic || "../images/dog2.png";

            document.getElementById("navAvatar").src = img;
            document.getElementById("profileImage").src = img;

        } catch (err) {
            console.error("Profile load error:", err);
        }
    }

    // IMAGE UPLOAD
    document.getElementById("imageUpload").addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append("profilePic", file);

        try {
            const res = await fetch("/admin/update-profile-pic", {
                method: "POST",
                body: formData
            });

            const result = await res.json();

            if (result.success) {
                document.getElementById("profileImage").src = result.path;
                document.getElementById("navAvatar").src = result.path;
            }

        } catch (err) {
            console.error(err);
        }
    });

});

</script>

</body>
</html>
