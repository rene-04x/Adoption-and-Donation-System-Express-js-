<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PAWSsion Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: #f8fafc; display: flex; }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100%;
            background: #f4f9ff; 
            z-index: 2000;
            padding: 20px 15px; 
            box-shadow: 4px 0 20px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5px 30px 5px;
        }

        .pawssion-brand {
            font-weight: 800;
            font-size: 22px;
            background: linear-gradient(90deg, #02407D 0%, #4E94DA 37.5%, #ACAB57 66.35%, #FBAB2A 95.67%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-brand-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-logo {
            height: 35px;
        }

        .sidebar-brand-text {
            line-height: 1;
        }

        .sidebar-subtitle {
            color: #64748b;
            font-size: 11px;
            font-weight: 600;
            margin-top: 2px;
        }

        .sidebar-label {
            color: #64748b;
            font-size: 10px;
            margin: 15px 0 10px 12px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 16px;
            color: #475569;
            font-size: 15px;
            font-weight: 500;
            border-radius: 12px;
            transition: all 0.2s ease;
            cursor: pointer;
            margin-bottom: 4px;
        }

        .nav-item i { font-size: 18px; width: 24px; text-align: center; }

        .nav-item:hover { background: rgba(2, 64, 125, 0.05); color: #02407D; }

        .active-item {
            background: #02407D !important;
            color: #ffffff !important;
            box-shadow: 0 4px 12px rgba(2, 64, 125, 0.2);
        }

        .sidebar-footer { margin-top: auto; padding-top: 20px; }

        @media (max-width: 900px) {
            .sidebar { left: -260px; }
            .top-navbar { left: 0; }
        }
        /* Use both classes to increase specificity */
        .nav-item.active-item {
            background: #02407D !important;
            color: #ffffff !important;
        }
        .nav-item.active-item i {
            color: #ffffff !important;
        }
        .sidebar-footer { 
            margin-top: auto; 
            padding: 20px 0; 
        }
        @media (max-width: 900px) {
            .sidebar { left: -260px; }
            .top-navbar { left: 0 !important; }
        }

    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-brand-row">
            <img src="../images/logo.png" alt="Logo" class="sidebar-logo">
            <div class="sidebar-brand-text">
                <div class="pawssion-brand">PAWSsion</div>
                <div class="sidebar-subtitle">Organization Portal</div>
            </div>
        </div>
    </div>

    <p class="sidebar-label">MAIN MENU</p>
    <div class="nav-item" id="dashboardBtn">
        <i class="fa-solid fa-table-cells-large"></i> Dashboard
    </div>

    <p class="sidebar-label">MANAGEMENT</p>
   
    <div class="nav-item " id="animalsBtn">
        <i class="fa-solid fa-paw" style="color: #0ea5e9;"></i> Pets
    </div>
    <div class="nav-item" id="adoptionBtn">
        <i class="fa-solid fa-shield-dog" style="color: #60a5fa;"></i> Adoption
    </div>
    <div class="nav-item" id="donationBtn">
        <i class="fa-solid fa-hand-holding-heart" style="color: #38bdf8;"></i> Donation
    </div>
    <div class="nav-item" id="announcementsBtn">
        <i class="fa-solid fa-bullhorn" style="color: #f87171;"></i> Announcement
    </div>

    <div class="sidebar-footer">
        <div class="nav-item" id="settingsBtn"><i class="fa-solid fa-gear" style="color: #60a5fa;"></i> Settings</div>
        <div class="nav-item" id="supportBtn"><i class="fa-solid fa-circle-question" style="color: #60a5fa;"></i> Support</div>
        <div class="nav-item" id="logoutBtn"><i class="fa-solid fa-arrow-right-from-bracket" style="color: #60a5fa;"></i> Log out</div>
    </div>
</div>
<script>
const navItems = document.querySelectorAll('.nav-item');

navItems.forEach(item => {
    item.addEventListener('click', function () {
        // remove active sa lahat
        navItems.forEach(i => i.classList.remove('active-item'));

        // add active sa clicked
        this.classList.add('active-item');

        // redirect based sa ID
        switch(this.id) {
            case "dashboardBtn":
                window.location.href = "home.html";
                break;
            case "organizationsBtn":
                window.location.href = "organizations.html";
                break;
            case "animalsBtn":
                window.location.href = "animals.html";
                break;
            case "adoptionBtn":
                window.location.href = "adoption.html";
                break;
            case "donationBtn":
                window.location.href = "donation.html";
                break;
            case "announcementsBtn":
                window.location.href = "announcement.html";
                break;
            case "monitoringBtn":
                window.location.href = "monitoring.html";
                break;
            case "analyticsBtn":
                window.location.href = "analytics.html";
                break;
            case "settingsBtn":
                window.location.href = "settings.html";
                break;
            case "supportBtn":
                window.location.href = "support.html";
                break;
            case "logoutBtn":
                window.location.href = "";
                break;
            }
    });
});

</script>
</body>
</html>
