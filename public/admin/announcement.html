<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAWSsion - Admin Announcements</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-blue: #02407D;
            --accent-blue: #3b82f6;
            --bg-light: #f4f9ff;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            /* This creates the transition from white at the top to soft blue at the bottom */
            background: linear-gradient(180deg, #FFFFFF 0%, #A5CFFF 100%);
            background-attachment: fixed; /* This keeps the background from moving when you scroll */
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
        }
        #announcementSection {
            padding: 100px 30px 40px 30px;
            margin-left: var(--sidebar-width); 
            transition: all 0.4s ease;
        }

        /* --- TOPBAR --- */
        .top-navbar {
            position: fixed;
            top: 0; left: var(--sidebar-width); right: 0;
            height: 70px;
            background: rgba(244, 249, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 1000;
            border-bottom: 1px solid #f1f5f9;
        }

        .header-title-section h1 { font-size: 18px; font-weight: 700; color: #02407D; }
        .header-title-section span { color: #ACAB57; }
        .pawssion-brand {
            font-weight: 800;
            background: linear-gradient(90deg, #02407D 0%, #4E94DA 37.5%, #ACAB57 66.35%, #FBAB2A 95.67%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* FIXED USER PROFILE SECTION */
        .user-profile-section { 
            display: flex; 
            align-items: center; 
            gap: 25px; 
            padding-right: 10px;
        }
        .user-info {
            display: flex;
            align-items: center; /* Vertical alignment fix */
            gap: 12px;
            cursor: pointer;
        }

        .user-name {
            font-size: 17px;
            font-weight: bold;
            color: #02407D;
        }
        .user-profile-section { display: flex; align-items: center; gap: 25px;  padding-right: 10px;}
        .notification-bell { position: relative; color: #02407D; font-size: 22px; cursor: pointer; }
        .notification-badge {
            position: absolute; top: -5px; right: -5px; background: #ff0000;
            color: white; font-size: 10px; padding: 2px 5px; border-radius: 50%; font-weight: bold;
        }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #02407D; object-fit: cover; }
 </style>
 <body>

    <div id="sidebar-placeholder"></div>

    <header class="top-navbar">
        <div class="header-title-section">
            <h1 class="pawssion-brand">CSPC PAWSsion <span>Benevolence Circle</span></h1>
            <p style="color: #64748b; font-size: 11px; font-weight: 600; margin-top: 2px;">Animal Adoption & Donation Management System</p>
        </div>
        <div class="user-profile-section">
            <div class="notification-bell">
                <i class="fa-solid fa-bell"></i>
                <span class="notification-badge">30</span>
            </div>
            <div class="user-info">
                <img src="../images/dog2.png" alt="Irene" class="user-avatar">
                <span class="user-name">Irene</span>
            </div>
        </div>
    </header>
    
    <script>
        // Load Sidebar
        fetch('sidebar.html').then(res => res.text()).then(data => {
            document.getElementById('sidebar-placeholder').innerHTML = data;
        });

        document.addEventListener("click", function(e){
        if(e.target.closest("#organizationsBtn")){
            window.location.href = "organizations.html";
        }
        if(e.target.closest("#dashboardBtn")){
            window.location.href = "home.html";
        }
        if(e.target.closest("#animalsBtn")){
            window.location.href = "animals.html";
        }
        if(e.target.closest("#adoptionBtn")){
            window.location.href = "adoptions.html";
        }   
        if(e.target.closest("#donationBtn")){
            window.location.href = "donation.html";
        }
        if(e.target.closest("#monitoringBtn")){
            window.location.href = "monitoring.html";   
        }
        if(e.target.closest("#analyticsBtn")){
            window.location.href = "analytics.html";   
        }
    });
        
</script>
    </body>
</html>
