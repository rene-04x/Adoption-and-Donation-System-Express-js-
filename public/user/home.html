<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAWSsion - Find Your Furry Friend</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    /* Smooth Scroll & Reset */
    html { scroll-behavior: smooth; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    a { text-decoration: none; transition: 0.3s ease; }

    body {
      background: linear-gradient(rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.5)), 
                  url('../images/PAWSsion 2027.png') no-repeat center center fixed; 
      background-size: cover;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      color: #333;
      transition: 0.4s ease;
      overflow-x: hidden;
    }

    /* --- HERO SECTION LAYOUT --- */
    #heroSection {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      width: 100%;
      padding: 120px 5% 60px;
      margin-left: 0;
    }

    /* This class is toggled by JS to readjust content when sidebar opens */
    body.sidebar-open #heroSection {
      margin-left: 320px;
      width: calc(100% - 320px);
    }

    .welcome-container { width: 100%; display: flex; justify-content: space-between; align-items: center; animation: fadeIn 1s ease-out; }
    .user-profile { display: flex; align-items: center; gap: 20px; }
    .user-profile img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #fff; box-shadow: 0 8px 16px rgba(0,0,0,0.1); object-fit: cover; }
    .user-profile h1 { font-size: 32px; font-weight: 900; color: #02407D; }

    .match-btn { 
      background-color: #02407D; color: white; padding: 15px 25px; 
      border-radius: 12px; font-weight: 700; display: flex; align-items: center; gap: 10px;
      transition: all 0.3s ease; box-shadow: 0 10px 20px rgba(2, 64, 125, 0.3);
    }
    .match-btn:hover { background-color: #0356a8; transform: translateY(-5px); box-shadow: 0 15px 30px rgba(2, 64, 125, 0.4); }

    .gallery-card {
      width: 100%; background: rgba(255, 255, 255, 0.85); margin-top: 40px; border-radius: 30px;
      padding: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3);
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }

    .pet-container { position: relative; border-radius: 20px; overflow: hidden; height: 220px; cursor: pointer; transition: 0.4s ease; }
    .pet-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
    .pet-container:hover .pet-img { transform: scale(1.1); }
    .pet-container:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
    .pet-container::after {
      content: 'View Details 🐾'; position: absolute; bottom: -50px; left: 0; width: 100%;
      background: rgba(2, 64, 125, 0.8); color: white; text-align: center; padding: 10px 0;
      transition: 0.3s; font-weight: 600; font-size: 14px;
    }
    .pet-container:hover::after { bottom: 0; }

    /* --- OVERLAY --- */
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(2, 64, 125, 0.2); backdrop-filter: blur(4px);
      display: none; z-index: 1500;
    }
    .overlay.active { display: block; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 1100px) { 
        body.sidebar-open #heroSection { margin-left: 0; width: 100%; }
    }
  </style>
</head>
<body>

  <div id="sidebar-placeholder"></div>
  <div class="overlay" id="overlay"></div>

  <div id="heroSection">
    <section class="welcome-container">
        <div class="user-profile">
            <img src="../images/imongavatar.png" alt="Profile">
            <div>
                <h1>Hi, Jhyzzeel!</h1>
                <p>Ready to find your new best friend? 🐾</p>
            </div>
        </div>
        <a href="#" class="match-btn">START MATCHMAKING</a>
    </section>

    <section class="gallery-card">
      <div class="pet-container"><img src="../images/dog1.png" class="pet-img" alt="Pet 1"></div>
      <div class="pet-container"><img src="../images/dog2.png" class="pet-img" alt="Pet 2"></div>
      <div class="pet-container"><img src="../images/dog3.png" class="pet-img" alt="Pet 3"></div>
      <div class="pet-container"><img src="../images/dog4.png" class="pet-img" alt="Pet 4"></div>
    </section>
  </div>

  <script>
    // Load the external sidebar
    fetch('sidebar.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('sidebar-placeholder').innerHTML = data;

        const sidebar = document.getElementById('sidebar');
        const menuToggle = document.getElementById('menuToggle');
        const overlay = document.getElementById('overlay');
        const dashBtn = document.getElementById('dashboardBtn');
        const adoptionBtn = document.getElementById('adoptionBtn');

        // Sidebar starts closed for the Home page
        sidebar.classList.add('closed');

        // Toggle logic: readjusts content and shows overlay
        menuToggle.addEventListener('click', () => {
          sidebar.classList.toggle('closed');
          document.body.classList.toggle('sidebar-open');
          overlay.classList.toggle('active');
        });

        // Close when overlay is clicked
        overlay.addEventListener('click', () => {
          sidebar.classList.add('closed');
          document.body.classList.remove('sidebar-open');
          overlay.classList.remove('active');
        });

        // Redirect logic for Dashboard button
        dashBtn.addEventListener('click', () => {
            window.location.href = 'dashboard.html';
        });

        // Redirect logic for Adoption Hub button
        adoptionBtn.addEventListener('click', () => {
            window.location.href = 'adoption_hub.html';
        });
      });
  </script>
</body>
</html>
