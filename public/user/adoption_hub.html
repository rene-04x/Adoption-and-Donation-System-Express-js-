<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAWSsion - Adoption Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
/* Page-Specific Styles (Pet Grid & Filters Only) */
* { margin:0; padding:0; box-sizing:border-box; }
a { text-decoration:none; transition:0.3s ease; }

body{
  background:#F8FAFC;
  font-family:'Inter',sans-serif;
  min-height:100vh;
  color:#333;
  overflow-x:hidden;
}

/* Logic for Content Shifting */
#hubSection{
  margin-left:320px;
  padding:110px 4% 40px;
  transition:all 0.4s ease;
  animation: fadeIn 0.8s ease-out;
}

body.sidebar-closed #hubSection{
  margin-left:0;
}

.hub-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.hub-header h1{
  font-size:28px;
  color:var(--primary-blue, #02407D);
  font-weight:800;
}

/* FILTER BAR */
.filter-bar{
  display:flex;
  gap:15px;
  margin-bottom:30px;
  align-items:center;
}

.search-box {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
}

.search-box i {
  position: absolute;
  left: 18px;
  color: #94a3b8; 
  font-size: 14px;
  pointer-events: none;
}

.search-box input {
  width: 100%;
  padding: 12px 20px 12px 45px;
  border-radius: 50px;
  border: 1px solid #e2e8f0;
  outline: none;
  font-size: 14px;
  transition: 0.3s;
}

.search-box input:focus {
  border-color: var(--primary-blue, #02407D);
  box-shadow: 0 0 0 3px rgba(2, 64, 125, 0.1);
}

.filter-btn{
  padding:10px 20px;
  border-radius:50px;
  border:1px solid #e2e8f0;
  background:white;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:8px;
  font-size:14px;
}
/* FILTER BAR */
.filter-bar{
  display:flex;
  gap:15px;
  margin-bottom:30px;
  align-items:center;
  position: relative; /* Added to establish stacking context */
  z-index: 100;       /* Ensures the bar stays above the grid */
}

/* DROPDOWN */
.dropdown{
  position:relative;
  display:inline-block;
}

.dropdown-content{
  display:none;
  position:absolute;
  right:0;
  background:white;
  min-width:180px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15); /* Increased shadow for depth */
  border-radius:12px;
  margin-top:5px;
  padding:8px 0;
  border:1px solid #e2e8f0;
  z-index: 1000;      /* HIGH Z-INDEX: Ensures it floats in front of pet cards */
}

.dropdown-content a{
  color:#333;
  padding:10px 16px;
  display:block;
  font-size:14px;
}

.dropdown-content a:hover{
  background:#f1f5f9;
  color: #02407D;
}


/* PET GRID */
.adoption-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:25px;
}

.pet-card{
  background:white;
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.03);
  transition:0.3s;
  position:relative;
  border:1px solid #f1f5f9;
}

.pet-card:hover{
  transform:translateY(-8px);
  box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

.pet-image-wrap{
  height:240px;
  width:100%;
  position:relative;
}

.pet-image-wrap img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.status-badge{
  position:absolute;
  top:15px;
  right:15px;
  background:rgba(255, 255, 255, 0.9);
  padding:4px 12px;
  border-radius:20px;
  font-size:11px;
  font-weight:700;
  color:#22c55e;
}

.match-badge{
  position:absolute;
  top:15px;
  left:15px;
  background:rgba(2, 64, 125, 0.7);
  color:white;
  padding:4px 12px;
  border-radius:20px;
  font-size:11px;
}

.species-badge {
  position:absolute;
  top:15px;
  left:15px;
  padding:6px 12px;
  border-radius:20px;
  font-size:11px;
  font-weight:800;
  text-transform:uppercase;
  color:white;
  z-index:2;
}

.species-badge.dog { background:#3b82f6; }
.species-badge.cat { background:#eab308; color:#1f2937; }

.status-badge{
  position:absolute;
  top:15px;
  right:15px;
  padding:4px 12px;
  border-radius:20px;
  font-size:11px;
  font-weight:700;
  color:#fff;
}

.status-badge.available { background:#16a34a; }
.status-badge.pending { background:#f97316; }
.status-badge.adopted { background:#dc2626; }

.card-content {
  padding:20px;
}

.card-content h3 {
  font-size:20px;
  margin-bottom:8px;
  color:#0f172a;
}

.card-meta {
  font-size:13px;
  color:#475569;
  margin-bottom:12px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
}

.card-meta span {
  display:inline-flex;
  align-items:center;
  gap:6px;
}

.gender-male { color:#3b82f6; }
.gender-female { color:#ec4899; }

.tags {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.tag {
  background:#f1f5f9;
  color:#475569;
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

.view-btn {
  width:100%;
  padding:12px 0;
  border-radius:16px;
  border:1px solid #e2e8f0;
  background:#f8fafc;
  color:#02407d;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

.view-btn:hover {
  background:#02407d;
  color:white;
}

.pet-info{
  display:none;
}

/* DROPDOWN */
.dropdown{
  position:relative;
  display:inline-block;
}

.dropdown-content{
  display:none;
  position:absolute;
  right:0;
  background:white;
  min-width:180px;
  box-shadow:0 8px 16px rgba(0,0,0,0.1);
  border-radius:12px;
  margin-top:5px;
  padding:8px 0;
  border:1px solid #e2e8f0;
}

.dropdown-content a{
  color:#333;
  padding:10px 16px;
  display:block;
  font-size:14px;
}

.dropdown-content a:hover{
  background:#f1f5f9;
  color:var(--primary-blue, #02407D);
}

.show{display:block;}

@keyframes fadeIn { 
  from { 
    opacity: 0; 
    transform: translateY(20px); /* This pushes the content 20px down at the start */
  } 
  to { 
    opacity: 1; 
    transform: translateY(0);    /* This moves it back to its original position */
  } 
}
</style>
</head>

<body>

<div id="sidebar-placeholder"></div>

<main id="hubSection">
  <div class="hub-header">
    <h1>Available Pets</h1>
  </div>
<div class="filter-bar">
   <div class="search-box">
  <i class="fa-solid fa-magnifying-glass"></i>
  <input type="text" placeholder="Search by name, breed..." oninput="updateDisplay()">
</div>

    <div class="dropdown" style="position: relative;">
      <button class="filter-btn" onclick="toggleDropdown('filterMenu')">
        <i class="fa-solid fa-filter"></i> Filter By ⌵
      </button>
      <div id="filterMenu" class="dropdown-content">
        <a href="#" onclick="filterBy('All')">All</a>
        <a href="#" onclick="filterBy('Dog')">Dogs</a>
        <a href="#" onclick="filterBy('Cat')">Cats</a>
      </div>
    </div>

    <div class="dropdown" style="position: relative;">
      <button class="filter-btn" onclick="toggleDropdown('sortMenu')">
        <i class="fa-solid fa-sort"></i> Sort By ⌵
      </button>
      <div id="sortMenu" class="dropdown-content">
        <a href="#" onclick="sortPets('Name: A-Z')">Name: A-Z</a>
        <a href="#" onclick="sortPets('Age: Youngest - Oldest')">Age: Youngest - Oldest</a>
      </div>
    </div>
</div>

<div class="adoption-grid" id="adoptionGrid">
    <div class="loading-message" style="grid-column:1/-1; text-align:center; padding:40px; color:#64748b;">
      <i class="fas fa-spinner fa-spin"></i> Loading available pets...
    </div>
</div>
  <div id="petModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:2000; justify-content:center; align-items:center;">
  <div style="background:white; width:90%; max-width:800px; border-radius:24px; display:flex; overflow:hidden; position:relative;">
    <button onclick="closeModal()" style="position:absolute; top:20px; right:20px; border:none; background:white; font-size:20px; cursor:pointer;"><i class="fa-solid fa-xmark"></i></button>
    
    <div style="width:40%; background:#eee;">
      <img id="modalImg" src="" style="width:100%; height:100%; object-fit:cover;">
    </div>
    
    <div style="width:60%; padding:40px; overflow-y:auto; max-height:80vh;">
      <h2 id="modalName" style="color:#02407D; font-size:32px; margin-bottom:10px;"></h2>
      <div id="modalDetails" style="font-size:14px; line-height:1.8; color:#333;">
        </div>
      <button id="adoptBtn" 
        style="margin-top:20px; background:#02407D; color:white; border:none; padding:12px 25px; border-radius:50px; cursor:pointer; font-weight:600;">
    Adopt Me
</button>
    </div>
  </div>
</div>
</main>

<script>

function toggleDropdown(id){
  document.getElementById("filterMenu").classList.remove("show");
  document.getElementById("sortMenu").classList.remove("show");
  document.getElementById(id).classList.toggle("show");
}

window.onclick = function(event){
  if(!event.target.matches('.filter-btn') && !event.target.closest('.filter-btn')){
    document.querySelectorAll(".dropdown-content").forEach(menu => menu.classList.remove("show"));
  }
}
// LOAD SIDEBAR
fetch('/sidebar')
.then(res => res.text())
.then(data => {
    document.getElementById('sidebar-placeholder').innerHTML = data;

    // Sidebar Toggle
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');

    if (menuToggle && sidebar) {
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('closed');
            document.body.classList.toggle('sidebar-closed');
        });
    }

    // 1. Kunin ang username sa URL
    const urlParams = new URLSearchParams(window.location.search);
    const username = urlParams.get('username') || 'User';
    const queryStr = `?username=${encodeURIComponent(username)}`;
    const currentPath = window.location.pathname;

    // 2. Helper function para sa navigation
    const setupNav = (btnId, targetPath) => {
        const btn = document.getElementById(btnId);
        if (btn) {
            // Highlight kung ito ang active page
            if (currentPath === targetPath) {
                btn.classList.add('active-item');
            }
            
            // Mag-redirect sa target path na may dala-dalang username
            btn.onclick = () => {
                if (currentPath !== targetPath) {
                    window.location.href = targetPath + queryStr;
                }
            };
        }
    };

    // I-setup lahat ng buttons
    setupNav('dashboardBtn', '/dashboard');
    setupNav('adoptionBtn', '/adoption_hub');
    setupNav('donationBtn', '/donations');
    setupNav('applicationBtn', '/application');
    setupNav('KamustahanBtn', '/kamustahan');
    // Sa loob ng iyong fetch('/sidebar') logic:
setupNav('logoutBtn', '/login'); // Gamitin ang route na '/login'

// At sa event listener:
btn.onclick = () => {
    if (btnId === 'logoutBtn') {
        // Gamitin ang short route '/login'
        window.location.href = '/login?msg=logged_out';
    } else if (currentPath !== targetPath) {
        window.location.href = targetPath + queryStr;
    }
};
});
let currentPetData = {};
let adoptionAnimals = [];

document.addEventListener('DOMContentLoaded', () => {
    loadAdoptionAnimals();
});

async function loadAdoptionAnimals() {
    try {
        const response = await fetch('/api/animals');
        if (!response.ok) throw new Error('Failed to load animals');

        adoptionAnimals = await response.json();
        renderAdoptionGrid(adoptionAnimals);
    } catch (error) {
        const grid = document.getElementById('adoptionGrid');
        grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:#ef4444;">Unable to load adoption pets at this time.</div>`;
        console.error(error);
    }
}

function renderAdoptionGrid(animals) {
    const grid = document.getElementById('adoptionGrid');
    grid.innerHTML = '';

    if (!animals || animals.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:#64748b;">No pets are currently available for adoption.</div>`;
        return;
    }

    animals.forEach(animal => {
        const ageText = formatAgeText(animal.age);
        const imgUrl = animal.image_url ? `/uploads/${animal.image_url}` : '../images/dog1.png';
        const statusText = animal.status || 'Unknown';
        const speciesText = animal.species || 'Unknown';

        const card = document.createElement('div');
        card.className = 'pet-card';
        card.dataset.name = animal.name || '';
        card.dataset.breed = animal.breed || '';
        card.dataset.type = speciesText;
        card.dataset.age = animal.age || '';
        card.dataset.sex = animal.gender || '';
        card.dataset.status = statusText;
        card.dataset.traits = animal.traits || '';

        card.innerHTML = `
            <div class="pet-image-wrap">
                <span class="species-badge ${speciesText.toLowerCase()}">${speciesText}</span>
                <span class="status-badge ${statusText.toLowerCase()}">${statusText}</span>
                <img src="${imgUrl}" alt="${animal.name}">
            </div>
            <div class="card-content">
                <h3>${animal.name || 'Unknown'}</h3>
                <div class="card-meta">
                    <span>${animal.breed || 'Unknown'}</span>
                    <span>•</span>
                    <span>${ageText}</span>
                    <span>•</span>
                    <span class="gender-${(animal.gender || '').toLowerCase()}">
                        <i class="fa-solid fa-${(animal.gender || '').toLowerCase() === 'male' ? 'mars' : 'venus'}"></i>
                        ${animal.gender || 'Unknown'}
                    </span>
                </div>
                <div class="tags">
                    ${(animal.traits || '').split(',').filter(t => t.trim()).map(t => `<span class="tag">${t.trim()}</span>`).join('')}
                </div>
                <button class="view-btn">View Profile</button>
            </div>
        `;

        card.addEventListener('click', () => openModal(animal));
        grid.appendChild(card);
    });
}

function openModal(animal) {
    const imgUrl = animal.image_url ? `/uploads/${animal.image_url}` : '../images/dog1.png';
    currentPetData = { ...animal, imgSrc: imgUrl };
    const modal = document.getElementById('petModal');

    document.getElementById('modalName').textContent = animal.name || 'Unknown';
    document.getElementById('modalImg').src = imgUrl;
    document.getElementById('modalDetails').innerHTML = `
            <p><strong>Type:</strong> ${animal.species || 'Unknown'}</p>
            <p><strong>Sex:</strong> ${animal.gender || 'Unknown'}</p>
            <p><strong>Breed:</strong> ${animal.breed || 'Unknown'}</p>
            <p><strong>Age:</strong> ${formatAgeText(animal.age)}</p>
            <p><strong>Behavior:</strong> ${animal.traits || 'No behavior details available.'}</p>
            <p><strong>Location:</strong> ${animal.rescue_location || 'Not recorded'}</p>
        `;
    modal.style.display = 'flex';
}

function formatAgeText(ageMonths) {
    if (ageMonths === undefined || ageMonths === null || ageMonths === '') return 'N/A';
    const months = Number(ageMonths);
    if (Number.isNaN(months) || months < 0) return String(ageMonths);
    if (months === 0) return '0 months old';

    const years = Math.floor(months / 12);
    const remainingMonths = months % 12;
    const yearText = years > 0 ? `${years} ${years === 1 ? 'year' : 'years'}` : '';
    const monthText = remainingMonths > 0 ? `${remainingMonths} ${remainingMonths === 1 ? 'month' : 'months'}` : '';
    return [yearText, monthText].filter(Boolean).join(' ').concat(' old');
}

function goToApplication() {
    const username = new URLSearchParams(window.location.search).get('username') || 'User';
    const dateApplied = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    
    // I-format ang URL parameters
    const params = new URLSearchParams({
        username: username,
        pet: currentPetData.name,
        img: currentPetData.imgSrc || '',
        date: dateApplied
    });
    
    // Mag-redirect sa application page
    window.location.href = `/application?${params.toString()}`;
}

// I-attach ang event listener sa button (gawin ito minsan lang sa labas)
document.getElementById('adoptBtn').addEventListener('click', goToApplication);
function closeModal() {
    const modal = document.getElementById('petModal');
    modal.style.display = 'none';
}

// Opsyonal: I-close ang modal kapag clinic ang labas (background)
window.onclick = function(event) {
    const modal = document.getElementById('petModal');
    if (event.target == modal) {
        modal.style.display = 'none';
    }
}
// Global State para ma-track ang kasalukuyang filter
let currentFilter = 'All';

// Master function na nag-aapply ng Search AT Filter
function updateDisplay() {
    const searchTerm = document.querySelector('.search-box input').value.toLowerCase();
    const cards = Array.from(document.querySelectorAll('.pet-card'));
    
    cards.forEach(card => {
        const name = card.dataset.name.toLowerCase();
        const breed = card.dataset.breed.toLowerCase();
        const type = card.dataset.type; // 'Dog' o 'Cat'
        const sex = card.dataset.sex;   // 'Male' o 'Female'
        
        // Logic: Search + Filter (Dapat pasok sa dalawa)
        const matchesSearch = name.includes(searchTerm) || breed.includes(searchTerm);
        const matchesFilter = (currentFilter === 'All' || type === currentFilter || sex === currentFilter);
        
        card.style.display = (matchesSearch && matchesFilter) ? 'block' : 'none';
    });
}

// Event Listener para sa Search
document.querySelector('.search-box input').addEventListener('input', updateDisplay);

// Function para sa Filter (tinatawag ng dropdown links)
function filterBy(category) {
    currentFilter = category;
    updateDisplay(); // I-apply ang bagong filter kasama ang existing search term
    document.querySelectorAll(".dropdown-content").forEach(m => m.classList.remove("show"));
}

// Function para sa Sort (Gumagana sa kahit anong display status)
function sortPets(criteria) {
    const grid = document.querySelector('.adoption-grid');
    const cards = Array.from(document.querySelectorAll('.pet-card'));
    
    cards.sort((a, b) => {
        if (criteria === 'Name: A-Z') return a.dataset.name.localeCompare(b.dataset.name);
        if (criteria === 'Age: Youngest - Oldest') return parseFloat(a.dataset.age) - parseFloat(b.dataset.age);
        if (criteria === 'Date Added: Newest - Oldest') return b.dataset.date.localeCompare(a.dataset.date);
    });
    
    // I-re-append ang mga cards sa tamang pagkakasunod-sunod
    cards.forEach(card => grid.appendChild(card));
    document.querySelectorAll(".dropdown-content").forEach(m => m.classList.remove("show"));
}
</script>

</body>
</html>
