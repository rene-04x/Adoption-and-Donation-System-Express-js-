<style>
    :root {
      --primary-blue: #02407D;
      --hover-blue: #7CA9FF;
      --accent-yellow: #FFD700;
      --glass-white: rgba(255, 255, 255, 0.85);
    }

    nav {
      position: fixed; top: 0; width: 100%; height: 80px;
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
      z-index: 3000; box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      display: flex; align-items: center; padding: 0 5%;
    }

    nav .logo { height: 50px; cursor: pointer; transition: transform 0.3s ease; }
    nav .logo:hover { transform: rotate(-5deg) scale(1.1); }
    nav .name { height: 28px; margin-left: 12px; }

    nav .account {
      margin-left: auto; display: flex; align-items: center;
      background-color: hsl(219, 100%, 74%, 20%);
      padding: 6px 16px; border-radius: 50px; cursor: pointer;
      border: 1px solid transparent; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    nav .account img.account-icon { width: 32px; height: 32px; border-radius: 50%; background: white; }
    nav .account a { color: var(--primary-blue); padding: 0 10px; font-weight: 700; font-size: 16px; }
    nav .account:hover { background-color: var(--primary-blue); transform: translateY(-2px); box-shadow: 0 8px 15px rgba(2, 64, 125, 0.2); }
    nav .account:hover a { color: #fff; }

    .sidebar {
      position: fixed; top: 0; left: 0; width: 320px; height: 100%;
      background: #fff; z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 100px 20px 40px; box-shadow: 10px 0 30px rgba(0,0,0,0.1);
      display: flex; flex-direction: column;
    }

    .sidebar.closed { left: -320px; }

    .sidebar-label { color: #777; font-size: 14px; margin: 25px 0 15px 15px; font-weight: 400; }
    .sidebar ul { list-style: none; }

    .nav-item {
      display: flex; align-items: center; gap: 15px; padding: 12px 15px;
      color: #333; font-size: 18px; font-weight: 500; border-radius: 10px;
      transition: 0.3s ease; margin-bottom: 5px; cursor: pointer;
    }

    .nav-item:hover { background-color: var(--primary-blue); color: white !important; }
    .active-item { background-color: var(--primary-blue) !important; color: white !important; }

    .nav-item:hover i, .nav-item:hover .icon,
    .active-item i, .active-item .icon { color: white !important; }
</style>
<nav>
    <img src="../images/logo.png" alt="PAWSsion Logo" class="logo" id="menuToggle">
    <img src="../images/PAWSsion.png" alt="PAWSsion" class="name">
    <div class="account" onclick="location.href='/login'">
        <img src="../images/account_icon.png" class="account-icon" alt="Account">
        <a href="/login">Profile</a>
    </div>
</nav>

<div class="sidebar" id="sidebar">
    <p class="sidebar-label">Menu</p>
    <div class="nav-item" id="dashboardBtn" onclick="location.href='dashboard.html'">
        <span class="icon">⊞</span> Dashboard
    </div>
    <ul>
        <li>
            <div class="nav-item" id="adoptionBtn" onclick="location.href='adoption_hub.html'">
                <i class="fa-solid fa-paw"></i> Adoption Hub
            </div>
        </li>
        <li><div class="nav-item"><span class="icon">⬡</span> Pet Matchmaker</div></li>
        <li><div class="nav-item"><span class="icon">📋</span> My Application</div></li>
    </ul>
    <p class="sidebar-label">Community & Support</p>
    <ul>
       <li>
          <div class="nav-item" id="donationBtn" onclick="location.href='donations.html'">
              <span class="icon"><i class="fa-solid fa-money-bill"></i></span> My Donations
          </div>
      </li>
        <li><div class="nav-item">Kamustahan</div></li>
    </ul>
</div>
