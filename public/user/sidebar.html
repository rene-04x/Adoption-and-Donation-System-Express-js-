<style>
:root{
    --primary-blue:#02407D;
    --hover-blue:#2f6edb;
    --accent-yellow:#FFD700;
    --glass-white:rgba(255,255,255,0.85);
}

/* NAVBAR */
nav{
    position:fixed;
    top:0;
    width:100%;
    height:80px;
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(10px);
    z-index:3000;
    box-shadow:0 4px 20px rgba(0,0,0,0.05);
    display:flex;
    align-items:center;
    padding:0 2%;
}

nav .logo{
    height:50px;
    cursor:pointer;
    transition:0.3s ease;
    margin-left:10px;
}

nav .logo:hover{
    transform:rotate(-5deg) scale(1.08);
}

nav .name{
    height:28px;
    margin-left:20px;
}

/* ACCOUNT BUTTON */
nav .account{
    margin-left:auto;
    margin-right:20px;
    display:flex;
    align-items:center;
    gap:10px;
    background:rgba(124,169,255,0.15);
    padding:8px 18px;
    border-radius:50px;
    cursor:pointer;
    border:1px solid rgba(2,64,125,0.15);
    transition:all .35s ease;
}

nav .account:hover{
    background:var(--primary-blue);
    transform:translateY(-2px);
    box-shadow:0 8px 15px rgba(2,64,125,0.25);
}

nav .account-icon{
    font-size:26px;
    color:var(--primary-blue);
    transition:0.3s;
}

nav .account a{
    color:var(--primary-blue);
    font-weight:600;
    font-size:15px;
    pointer-events:none;
}

nav .account:hover .account-icon,
nav .account:hover a{
    color:white !important;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:300px;
    height:100%;
    background:#ffffff;
    z-index:2000;
    padding:100px 20px 40px;
    box-shadow:8px 0 30px rgba(0,0,0,0.08);
    display:flex;
    flex-direction:column;
    transition:0.35s ease;
}

.sidebar.closed{
    left:-300px;
}

.sidebar-label{
    color:#777;
    font-size:13px;
    margin:25px 0 12px 12px;
    font-weight:500;
    letter-spacing:1px;
}

.sidebar ul{
    list-style:none;
}

.pawssion-brand {
    font-family: 'Inter', sans-serif; /* Para sumunod sa font ng dashboard */
    font-weight: 800;
    font-size: 24px;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, #02407D 0%, #4E94DA 37.5%, #ACAB57 66.35%, #FBAB2A 95.67%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: inline-block;
    vertical-align: middle;
    transition: transform 0.3s ease;
}

.pawssion-brand:hover {
    transform: scale(1.02);
}

/* SIDEBAR ITEMS */
.nav-item{
    display:flex;
    align-items:center;
    gap:14px;
    padding:12px 15px;
    color:#333;
    font-size:16px;
    font-weight:500;
    border-radius:10px;
    transition:all .25s ease;
    margin-bottom:6px;
    cursor:pointer;
}

.nav-item i{
    color:var(--primary-blue);
    font-size:18px;
}

.nav-item:hover{
    background:linear-gradient(135deg,var(--primary-blue),var(--hover-blue));
    color:white;
    transform:translateX(5px);
}

.nav-item:hover i{
    color:white;
}

.active-item{
    background:var(--primary-blue);
    color:white !important;
}

.active-item i{
    color:white !important;
}

/* MOBILE */
@media(max-width:900px){

    .sidebar{
        left:-300px;
    }

}
</style>


<nav>
    <img src="../images/logo.png" alt="PAWSsion Logo" class="logo" id="menuToggle">
    
    <div class="pawssion-brand" id="homeLink" style="cursor: pointer; margin-left: 15px;">
        PAWSsion
    </div>

    <div class="account" onclick="location.href='/profile'">
        <i class="fa-solid fa-circle-user account-icon"></i>
        <a href="/profile">Profile</a>
    </div>
</nav>


<div class="sidebar" id="sidebar">

    <p class="sidebar-label">Menu</p>

    <div class="nav-item" id="dashboardBtn" data-link="/dashboard">
        <span class="icon">⊞</span> Dashboard
    </div>

    <ul>

        <li>
            <div class="nav-item" id="adoptionBtn" data-link="/adoption_hub">
                <i class="fa-solid fa-paw"></i> Adoption Hub
            </div>
        </li>

        <li>
            <div class="nav-item" id="applicationBtn" data-link="/application">
                <i class="fa-solid fa-chalkboard-user"></i>
                My Application
            </div>
        </li>

    </ul>
    <p class="sidebar-label">Community & Support</p>
    <ul>

        <li>
            <div class="nav-item" id="donationBtn" data-link="/donations">
                <i class="fa-solid fa-money-bill"></i>
                My Donations
            </div>
        </li>

    </ul>
    <div class="logout-section" style="margin-top: auto; padding-top: 20px;">
    <div class="nav-item" id="logoutBtn" data-link="/login">
        <i class="fa-solid fa-arrow-right-from-bracket"></i>
        Log Out
    </div>
</div>

</div>

<script>
    /* SIDEBAR TOGGLE */
    const menuToggle = document.getElementById("menuToggle");
    const sidebar = document.getElementById("sidebar");

    menuToggle.addEventListener("click", () => {
        sidebar.classList.toggle("closed");
    });

    /* CLOSE ON MOBILE */
    if (window.innerWidth < 900) {
        sidebar.classList.add("closed");
    }

   const currentPage = window.location.pathname;
const urlParams = new URLSearchParams(window.location.search);
const username = urlParams.get('username') || 'User';

// Pinili natin lahat ng may class na .nav-item
document.querySelectorAll(".nav-item").forEach(item => {
    const link = item.dataset.link;
    if (!link) return; // Laktawan kung walang data-link

    // I-highlight ang active page (maliban sa logout)
    if (currentPage === link && item.id !== "logoutBtn") {
        item.classList.add("active-item");
    }

    item.addEventListener("click", () => {
        // Log Out Logic
        if (item.id === "logoutBtn") {
            window.location.href = `${link}?msg=logged_out`;
        } 
        // Normal Navigation Logic
        else if (currentPage !== link) {
            window.location.href = `${link}?username=${encodeURIComponent(username)}`;
        }
    });
});
</script>
