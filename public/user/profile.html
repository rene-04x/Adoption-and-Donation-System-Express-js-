<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAWSsion - Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
:root{
    --primary-blue:#02407D;
    --primary-light:#2f6edb;
    --accent-yellow:#FFD700;
    --bg-gray:#F4F7FB;
    --card-shadow:0 20px 45px rgba(0,0,0,0.08);
    --soft-shadow:0 8px 25px rgba(0,0,0,0.05);
}

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    text-decoration:none;
}

body{
    background:linear-gradient(180deg,#f8fafc,#eef2f7);
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
}

/* NAVBAR */
nav{
    position:fixed;
    top:0;
    width:100%;
    height:80px;
    background:rgba(255,255,255,0.85);
    backdrop-filter:blur(12px);
    z-index:3000;
    display:flex;
    align-items:center;
    padding:0 2%;
    border-bottom:1px solid rgba(0,0,0,0.04);
}

nav .logo{
    height:50px;
    cursor:pointer;
    transition:0.35s;
    margin-left:10px;
}

nav .logo:hover{
    transform:scale(1.1) rotate(-5deg);
}

nav .name{
    height:28px;
    margin-left:20px;
}

/* ACCOUNT BUTTON */
nav .account{
    margin-left:auto;
    margin-right:20px;
    display:flex;
    align-items:center;
    gap:12px;
    background:linear-gradient(135deg,#e6f0ff,#f6f9ff);
    padding:8px 18px;
    border-radius:50px;
    cursor:pointer;
    border:1px solid rgba(2,64,125,0.08);
    transition:0.35s;
}

nav .account:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 18px rgba(2,64,125,0.15);
}

nav .account-icon{
    font-size:26px;
    color:var(--primary-blue);
}

nav .account a{
    color:var(--primary-blue);
    font-weight:600;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:300px;
    height:100%;
    background:#ffffff;
    padding:100px 20px 40px;
    box-shadow:var(--card-shadow);
    transition:0.4s;
    z-index:2000;
}

.sidebar.closed{
    left:-300px;
}

.sidebar-label{
    color:#8a8a8a;
    font-size:13px;
    margin:25px 0 10px 12px;
    text-transform:uppercase;
    letter-spacing:1px;
}

.sidebar ul{
    list-style:none;
}

.nav-item{
    display:flex;
    align-items:center;
    gap:14px;
    padding:14px 16px;
    border-radius:12px;
    font-size:16px;
    font-weight:500;
    color:#333;
    transition:0.25s;
    cursor:pointer;
}

.nav-item i{
    font-size:18px;
    color:var(--primary-blue);
}

.nav-item:hover{
    background:linear-gradient(135deg,var(--primary-blue),var(--primary-light));
    color:#fff;
    transform:translateX(5px);
}

.nav-item:hover i{
    color:#fff;
}

/* PROFILE CONTAINER */
.profile-container{
    margin-left:300px;
    padding-top:120px;
    padding-bottom:60px;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.4s;
}

body.sidebar-closed .profile-container{
    margin-left:0;
}

/* PROFILE CARD */
.profile-card{
    width:100%;
    max-width:720px;
    background:rgba(255,255,255,0.8);
    backdrop-filter:blur(14px);
    border-radius:25px;
    padding:45px;
    box-shadow:var(--card-shadow);
    text-align:center;
}

/* AVATAR */
.avatar-image{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #fff;
    box-shadow:var(--soft-shadow);
}

.change-pic-btn{
    margin-top:18px;
    background:linear-gradient(135deg,#f6f9ff,#edf3ff);
    border:1px solid #dce6f8;
    padding:8px 18px;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:8px;
    transition:0.25s;
}

.change-pic-btn:hover{
    background:var(--primary-blue);
    color:#fff;
}

/* WELCOME */
.welcome-text{
    font-size:26px;
    font-weight:800;
    margin:25px 0 30px;
}

/* INFO BOX */
.info-box{
    background:#ffffff;
    border-radius:18px;
    padding:30px;
    box-shadow:var(--soft-shadow);
}

/* ROWS */
.info-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 0;
    border-bottom:1px solid #f2f2f2;
}

.info-row:last-child{
    border-bottom:none;
}

.label{
    font-weight:500;
    color:#555;
}

.value{
    font-weight:500;
}

/* SET BUTTON */
.btn-set{
    background:linear-gradient(135deg,#eef3ff,#dfe9ff);
    border:1px solid #d4def7;
    padding:6px 14px;
    border-radius:8px;
    cursor:pointer;
    transition:0.25s;
}

.btn-set:hover{
    background:var(--primary-blue);
    color:#fff;
}
/* SUCCESS TOAST */
.toast{
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #22c55e;
    color: white;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    opacity: 0;
    transform: translateY(20px);
    transition: 0.4s ease;
    z-index: 5000;
}

.toast.show{
    opacity: 1;
    transform: translateY(0);
}
/* RESPONSIVE */
@media(max-width:900px){

    .sidebar{
        left:-300px;
    }

    .profile-container{
        margin-left:0;
        padding:110px 20px;
    }

    .profile-card{
        padding:35px 25px;
    }
}
</style>
</head>
<body>

<nav>
    <img src="/images/logo.png" alt="PAWSsion Logo" class="logo" id="menuToggle">
    <img src="/images/PAWSsion.png" alt="PAWSsion" class="name">
    <div class="account" onclick="location.href='/profile'">
        <i class="fa-solid fa-circle-user account-icon"></i>
        <a href="/profile">Profile</a>
    </div>
</nav>

<div class="sidebar" id="sidebar">
    <p class="sidebar-label">Menu</p>
    <div class="nav-item" id="dashboardBtn" onclick="location.href='/dashboard'">
        <span class="icon">⊞</span> Dashboard
    </div>
    <ul>
        <li>
            <div class="nav-item" id="adoptionBtn" onclick="location.href='/adoption_hub'">
                <i class="fa-solid fa-paw"></i> Adoption Hub
            </div>
        </li>
        <li>
            <div class="nav-item" id="applicationBtn" onclick="location.href='/home'">
                <span class="icon"><i class="fa-solid fa-chalkboard-user"></i></span> 
                My Application
            </div>
        </li>
    </ul>
    <p class="sidebar-label">Community & Support</p>
    <ul>
       <li>
          <div class="nav-item" id="donationBtn" onclick="location.href='/donations'">
              <span class="icon"><i class="fa-solid fa-money-bill"></i></span> My Donations
          </div>
      </li>
    </ul>
</div>

<main class="profile-container">
    <div class="profile-card">
        <div class="avatar-section">
            <img id="profileImage" class="avatar-image" src="../images/imongavatar.png" alt="Profile">
            <br>
            <input type="file" id="imageUpload" accept="image/*" style="display:none">
            <button class="change-pic-btn" onclick="document.getElementById('imageUpload').click()">
                <i class="fa-regular fa-image"></i> Change Picture
            </button>
        </div>
        <br>
        <h2 style="margin-bottom: 20px;">Welcome, Jhyzeel Dianela!</h2>

        <div class="info-box">
            <div class="info-row">
                <span class="label">Name</span>
                <span class="value">Jhyzeel Dianela</span>
            </div>
            <div class="info-row">
                <span class="label">Email Address</span>
                <span class="value">jhydianela@gmail.com</span>
            </div>
            <div class="info-row">
                <span class="label">Mobile Number</span>
                <button class="btn-set">Set a mobile number</button>
            </div>
            <div class="info-row">
                <span class="label">Account type</span>
                <span class="value">Adopter</span>
            </div>
        </div>
    </div>
</main>
<div id="successToast" class="toast">
    <i class="fa-solid fa-circle-check"></i> Profile picture updated successfully
</div>
</body>
<script>
    // Sidebar Logic
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const body = document.body;

    menuToggle.addEventListener('click', () => {
        sidebar.classList.toggle('closed');
        body.classList.toggle('sidebar-closed');
    });

    // Close on mobile by default
    if (window.innerWidth < 900) {
        sidebar.classList.add('closed');
        body.classList.add('sidebar-closed');
    }

    // Highlighting current page in sidebar
    document.addEventListener('DOMContentLoaded', () => {
        // Since we are on /profile, we can highlight a specific item if needed.
        // Or leave it as is.
    });
    // Profile picture change
    const imageUpload = document.getElementById("imageUpload");
const profileImage = document.getElementById("profileImage");
const toast = document.getElementById("successToast");

// load saved image
const savedImage = localStorage.getItem("profileImage");
if(savedImage){
    profileImage.src = savedImage;
}

imageUpload.addEventListener("change", function(){
    const file = this.files[0];

    if(file){
        const reader = new FileReader();

        reader.onload = function(e){
            profileImage.src = e.target.result;

            // save locally
            localStorage.setItem("profileImage", e.target.result);

            // show success notification
            toast.classList.add("show");

            setTimeout(()=>{
                toast.classList.remove("show");
            },3000);
        }

        reader.readAsDataURL(file);
    }
});
</script>

</body>
</html>
