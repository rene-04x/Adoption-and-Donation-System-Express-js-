<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAWSsion Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        
        <div class="branding-side" >
            <a href="/" class="close-btn">X</a>
            <div class="paw-print" style="top: 10%; left: 10%;"></div>
            <div class="paw-print" style="top: 20%; left: 80%;"></div>
            <div class="paw-print" style="top: 50%; left: 30%;"></div>
            <div class="paw-print" style="top: 70%; left: 70%;"></div>
            <div class="paw-print" style="top: 85%; left: 20%;"></div>
            <h1 class="welcome-text">Welcome to PAWSsion!</h1>
            <a href="/">
                <img src="../images/logo.png" alt="PAWSsion Logo" class="main-logo-img">
            </a>
            <div class="bottom-info">
                <p>© 2026 PAWSsion System</p>
                <div class="policy-links">
                    <a href="#">Privacy Policy</a> | <a href="#">Terms of Service</a>
                </div>
            </div>
        </div>

        <div class="form-side">
            <div class="header-pill">SIGN IN</div>
            
            <p class="description">
                Sign in to view available pets, manage your adoption requests, and track your donations. Together, we can make a difference.
            </p>
            
            <hr class="divider">

            <div class="signin-card">
                <form method="post" action="/login">
                    <div class="input-group">
                        <label>Username</label>
                        <div class="input-wrapper">
                            <i class="fas fa-paw"></i>
                            <input type="text" name="username" placeholder="Enter your Username" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" name="password" placeholder="Enter your Password" required>
                            <i class="fas fa-eye toggle-password" data-target="password"></i>
                        </div>
                    </div>

                    
                    <button type="submit" class="signup-btn">Log in</button>
                     
               
                </form>

                <div class="footer-links">
                    <span class="forget-acc"><i class="fas fa-paw"></i> Not registered yet?</span>
                    <a href="/user-signup" class="register-link">Create an Account as User</a>
                    <div class="or-text">OR</div>
                    <a href="/org-register" class="register-link">Register your Organization</a>
                </div>
            </div>
        </div>
    </div>    
</body>
</html>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('status') === 'registered') {
        Swal.fire({
            title: 'Account Created!',
            text: 'Registration successful. You can now log in to your account.',
            icon: 'success',
            confirmButtonColor: '#ff8c00',
            confirmButtonText: 'Great!'
        });
    }

    //for eye toggle in password field
    document.querySelectorAll('.toggle-password').forEach(item => {
        item.addEventListener('click', function () {
            const target = document.getElementById(this.getAttribute('data-target'));
            const type = target.getAttribute('type') === 'password' ? 'text' : 'password';
            target.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash'); // Toggle eye icon
        });
    });
</script>
