<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAWSsion - Feedback</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>

:root{
--primary-blue:#02407D;
--primary-light:#2f6edb;
--bg-gray:#F4F7FB;
--card-shadow:0 20px 45px rgba(0,0,0,0.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:linear-gradient(180deg,#f8fafc,#eef2f7);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* BUTTON */

.open-btn{
background:var(--primary-blue);
color:white;
padding:14px 26px;
border:none;
border-radius:30px;
font-size:15px;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
transition:0.3s;
}

.open-btn:hover{
transform:translateY(-3px);
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-content{
background:white;
width:420px;
padding:30px;
border-radius:18px;
box-shadow:var(--card-shadow);
position:relative;
animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
from{transform:translateY(-20px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

/* CLOSE BUTTON */

.close{
position:absolute;
top:12px;
right:16px;
font-size:20px;
cursor:pointer;
color:#777;
}

/* HEADER */

.modal-content h2{
margin-bottom:10px;
color:var(--primary-blue);
}

.modal-content p{
font-size:14px;
color:#666;
margin-bottom:20px;
}

/* FORM */

input, textarea{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

textarea{
resize:none;
height:110px;
}

button.submit{
width:100%;
background:var(--primary-blue);
color:white;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

button.submit:hover{
background:var(--primary-light);
}

/* SUCCESS MESSAGE */

.success{
display:none;
text-align:center;
padding:20px;
}

.success i{
font-size:40px;
color:#22c55e;
margin-bottom:10px;
}

</style>

</head>

<body>

<button class="open-btn" onclick="openModal()">
<i class="fa-solid fa-comment"></i> Give Feedback
</button>

<div id="feedbackModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">×</span>

<div id="feedbackForm">

<h2>Submit Feedback</h2>
<p>Help us improve PAWSsion by sharing your thoughts.</p>

<form onsubmit="submitFeedback(event)">

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Your Email" required>

<textarea placeholder="Write your feedback..." required></textarea>

<button class="submit">Send Feedback</button>

</form>

</div>

<div id="successMessage" class="success">

<i class="fa-solid fa-circle-check"></i>

<h3>Thank you!</h3>
<p>Your feedback has been submitted.</p>

</div>

</div>

</div>

<script>

function openModal(){
document.getElementById("feedbackModal").style.display="flex";
}

function closeModal(){
document.getElementById("feedbackModal").style.display="none";
}

window.onclick=function(e){
const modal=document.getElementById("feedbackModal");
if(e.target==modal){
modal.style.display="none";
}
}

function submitFeedback(e){
e.preventDefault();

document.getElementById("feedbackForm").style.display="none";
document.getElementById("successMessage").style.display="block";
}

</script>

</body>
</html>
